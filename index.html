<style>
    .body-type-container {
        display: flex;
        gap: 15px;
        margin-top: 15px;
    }
    .body-option {
        flex: 1;
        text-align: center;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 15px 5px;
        cursor: pointer;
        transition: all 0.3s ease;
        background: #fff;
    }
    .body-option:hover {
        border-color: #000;
        transform: translateY(-3px);
    }
    .body-option img {
        width: 100%;
        max-width: 60px; /* Tamaño ideal para móvil */
        height: auto;
        margin-bottom: 10px;
        opacity: 0.7;
    }
    .body-option.selected {
        border-color: #1a1a1a;
        background: #f0f0f0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .body-option.selected img { opacity: 1; }
    
    .body-label { font-size: 0.75rem; font-weight: 700; display: block; margin-bottom: 2px; }
    .body-desc { font-size: 0.6rem; color: #888; line-height: 1; }
</style>

<div class="input-group">
    <label style="color:#333; font-size: 0.9rem;">2. Define tu silueta:</label>
    <div class="body-type-container">
        
        <div class="body-option" onclick="selectBody(this, 'ectomorfa')">
            <img src="https://cdn-icons-png.flaticon.com/512/6064/6064951.png" alt="Ectomorfa">
            <span class="body-label">Ectomorfa</span>
            <span class="body-desc">Esbelta / Recta</span>
        </div>

        <div class="body-option" onclick="selectBody(this, 'mesomorfa')">
            <img src="https://cdn-icons-png.flaticon.com/512/6064/6064942.png" alt="Mesomorfa">
            <span class="body-label">Mesomorfa</span>
            <span class="body-desc">Reloj de arena</span>
        </div>

        <div class="body-option" onclick="selectBody(this, 'endomorfa')">
            <img src="https://cdn-icons-png.flaticon.com/512/6065/6065003.png" alt="Endomorfa">
            <span class="body-label">Endomorfa</span>
            <span class="body-desc">Curvas / Robusta</span>
        </div>

    </div>
</div>
