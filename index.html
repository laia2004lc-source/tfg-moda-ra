<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARESME DIGITAL | Probador Realista</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fff; color: #1a1a1a; }
        nav { padding: 20px 5%; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .product-page { display: flex; flex-wrap: wrap; padding: 40px 5%; gap: 40px; }
        .visual-container { flex: 1; min-width: 350px; height: 600px; background: #f9f9f9; border-radius: 15px; overflow: hidden; }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        model-viewer { width: 100%; height: 100%; display: none; }

        /* Estilos del Probador */
        .probador-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; text-align: center; }
        .probador-overlay.active { display: block; }
        
        .step { margin-bottom: 30px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .body-type-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .body-option { flex: 1; border: 1px solid #ddd; border-radius: 12px; padding: 10px; cursor: pointer; max-width: 110px; }
        .body-option.selected { border: 2px solid #000; background: #f0f0f0; }
        .body-option img { width: 100%; height: auto; border-radius: 5px; }

        .btn { width: 100%; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; margin-bottom: 10px; }
        .btn-black { background: #1a1a1a; color: #fff; }
        
        #loading-screen { display: none; margin-top: 40px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1a1a1a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav><div style="font-weight:800; letter-spacing:2px;">MARESME DIGITAL</div></nav>

<div class="product-page">
    <div class="visual-container">
        <img src="modelo_polo.jpg" id="main-photo" class="main-img" alt="Polo Executive">
        
        <model-viewer id="ar-viewer" 
            src="https://models.readyplayer.me/64f06649646487e357545803.glb" 
            ar camera-controls shadow-intensity="1" auto-rotate>
        </model-viewer>
    </div>

    <div class="info-container">
        <h1>Polo Executive</h1>
        <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 30px;">45,00 €</p>
        <button class="btn btn-black" onclick="abrirProbador()">🤳 PROBAR CON MI AVATAR IA</button>
    </div>
</div>

<div id="probador" class="probador-overlay">
    <h2 style="margin-top:40px;">Tu Probador Personalizado</h2>
    
    <div class="step">
        <h3>1. Medidas Corporales:</h3>
        <input type="number" id="h" placeholder="Altura (cm)" style="padding:10px; width:100px; border-radius:8px; border:1px solid #ddd;">
        <input type="number" id="w" placeholder="Peso (kg)" style="padding:10px; width:100px; border-radius:8px; border:1px solid #ddd;">
    </div>

    <div class="step">
        <h3>2. Tipo de Silueta:</h3>
        <div class="body-type-container">
            <div class="body-option" onclick="selectBody(this, 'Ectomorfa')">
                <img src="https://i.ibb.co/VvYfF39/ectomorph.png" alt="Ectomorfa">
                <p style="font-size:0.6rem; font-weight:bold;">ECTOMORFA</p>
            </div>
            <div class="body-option" onclick="selectBody(this, 'Mesomorfa')">
                <img src="https://i.ibb.co/LkvmY3Y/mesomorph.png" alt="Mesomorfa">
                <p style="font-size:0.6rem; font-weight:bold;">MESOMORFA</p>
            </div>
            <div class="body-option" onclick="selectBody(this, 'Endomorfa')">
                <img src="https://i.ibb.co/X7WqS7B/endomorph.png" alt="Endomorfa">
                <p style="font-size:0.6rem; font-weight:bold;">ENDOMORFA</p>
            </div>
        </div>
    </div>

    <div class="step">
        <h3>3. Selfie (Mapeo Facial):</h3>
        <input type="file" accept="image/*">
    </div>

    <button id="gen-btn" class="btn btn-black" onclick="generar()">GENERAR AVATAR CON MI CARA</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="msg"><b>Mapeando fisonomía corporal y facial...</b></p>
    </div>
</div>

<script>
    let cuerpo = "";
    function abrirProbador() { document.getElementById('probador').classList.add('active'); }
    function cerrarProbador() { document.getElementById('probador').classList.remove('active'); }
    function selectBody(el, type) {
        document.querySelectorAll('.body-option').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        cuerpo = type;
    }

    function generar() {
        const height = document.getElementById('h').value;
        if(!height || !cuerpo) { alert("Introduce tus datos primero."); return; }

        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
        document.getElementById('msg').innerHTML = `<b>Generando Avatar Humano (${cuerpo} - ${height}cm)...</b>`;

        // Simulación de 6 segundos
        setTimeout(() => {
            cerrarProbador();
            document.getElementById('main-photo').style.display = 'none';
            document.getElementById('ar-viewer').style.display = 'block';
        }, 6000);
    }
</script>

</body>
</html>
