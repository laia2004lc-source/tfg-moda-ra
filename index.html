<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARESME DIGITAL | Probador IA</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fff; color: #1a1a1a; }
        nav { display: flex; justify-content: space-between; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .product-page { display: flex; flex-wrap: wrap; padding: 40px 5%; gap: 40px; }
        .visual-container { flex: 1; min-width: 350px; height: 600px; background: #f9f9f9; border-radius: 15px; overflow: hidden; }
        .main-img { width: 100%; height: 100%; object-fit: cover; }
        model-viewer { width: 100%; height: 100%; display: none; }

        .info-container { flex: 1; min-width: 300px; }
        .btn { width: 100%; padding: 18px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; border: none; }
        .btn-black { background: #1a1a1a; color: #fff; }
        .btn-outline { background: #fff; border: 2px solid #1a1a1a; }

        /* EL PROBADOR PERSONALIZADO */
        .probador-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; text-align: center; }
        .probador-overlay.active { display: block; }
        
        .step { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
        .input-medidas { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100px; margin: 5px; }
        
        .body-type-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .body-option { flex: 1; border: 1px solid #ddd; border-radius: 12px; padding: 10px; cursor: pointer; max-width: 110px; }
        .body-option.selected { border: 2px solid #000; background: #f0f0f0; }
        .body-option img { width: 100%; height: auto; }

        #loading-screen { display: none; margin-top: 40px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1a1a1a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav><div style="font-weight:800;">MARESME DIGITAL</div></nav>

<div class="product-page">
    <div class="visual-container">
        <img src="modelo_polo.jpg" id="main-photo" class="main-img" alt="Modelo Real">
        <model-viewer id="ar-viewer" src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" ar camera-controls auto-rotate></model-viewer>
    </div>

    <div class="info-container">
        <h1>Polo Executive</h1>
        <p class="price">45,00 €</p>
        <button class="btn btn-black">COMPRAR AHORA</button>
        <button class="btn btn-outline" onclick="abrirProbador()">🤳 CREAR MI AVATAR 3D (CON MI CARA)</button>
    </div>
</div>

<div id="probador" class="probador-overlay">
    <h2>Configuración de tu Avatar Personalizado</h2>
    
    <div class="step">
        <h3>1. Tus medidas reales:</h3>
        <input type="number" id="user-h" placeholder="Altura (cm)" class="input-medidas">
        <input type="number" id="user-w" placeholder="Peso (kg)" class="input-medidas">
    </div>

    <div class="step">
        <h3>2. Tu tipo de cuerpo:</h3>
        <div class="body-type-container">
            <div class="body-option" onclick="selectBody(this, 'Ectomorfa')">
                <img src="https://cdn-icons-png.flaticon.com/512/1000/1000997.png">
                <p style="font-size:0.6rem;">ECTOMORFA</p>
            </div>
            <div class="body-option" onclick="selectBody(this, 'Mesomorfa')">
                <img src="https://cdn-icons-png.flaticon.com/512/1000/1000994.png">
                <p style="font-size:0.6rem;">MESOMORFA</p>
            </div>
            <div class="body-option" onclick="selectBody(this, 'Endomorfa')">
                <img src="https://cdn-icons-png.flaticon.com/512/1001/1001000.png">
                <p style="font-size:0.6rem;">ENDOMORFA</p>
            </div>
        </div>
    </div>

    <div class="step">
        <h3>3. Sube tu selfie (Mapeo Facial):</h3>
        <input type="file" id="user-photo" accept="image/*">
    </div>

    <button id="gen-btn" class="btn btn-black" onclick="generar()">GENERAR AVATAR CON MI CARA</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="status-msg"><b>Procesando...</b></p>
        <p style="font-size:0.8rem; color:#666;">Mapeando facciones sobre el modelo 3D según tus medidas corporales.</p>
    </div>
</div>

<script>
    let selectedBody = "";
    function abrirProbador() { document.getElementById('probador').classList.add('active'); }
    function cerrarProbador() { document.getElementById('probador').classList.remove('active'); }
    function selectBody(el, type) {
        document.querySelectorAll('.body-option').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        selectedBody = type;
    }

    function generar() {
        const h = document.getElementById('user-h').value;
        if(!h || !selectedBody) { alert("Pon tus medidas y elige cuerpo"); return; }

        document.getElementById('gen-btn').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';
        document.getElementById('status-msg').innerHTML = `<b>Generando Avatar ${selectedBody} (${h}cm) con mapeo facial...</b>`;

        setTimeout(() => {
            cerrarProbador();
            document.getElementById('main-photo').style.display = 'none';
            document.getElementById('ar-viewer').style.display = 'block';
        }, 5000);
    }
</script>

</body>
</html>
